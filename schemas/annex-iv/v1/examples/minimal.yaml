# Minimal valid Annex IV declaration
# This is the bare minimum required to pass actcheck validation.
# Start here, then add detail progressively.

actcheck:
  schema_version: "1.0.0"
  declaration_date: "2026-05-17"

general_description:
  intended_purpose: "AI-powered document classification system for internal use."
  provider:
    name: "Acme Corp B.V."
  system_version: "1.0.0"
  software_versions:
    components:
      - name: "acme-classifier"
        version: "1.0.0"
  distribution_forms:
    - form: api
      description: "REST API deployed on-premises."
  target_hardware: "Linux server with 16GB RAM, NVIDIA T4 GPU for inference."
  product_integration:
    is_component_of_product: false
  deployer_interface: "Web dashboard for uploading documents and viewing classification results."

development:
  methods:
    development_steps: "Fine-tuned BERT-base on internal document corpus using supervised learning."
  design_specifications:
    general_logic: "Documents are tokenized, passed through a transformer encoder, and classified into 12 categories."
    algorithms: "BERT-base (110M parameters) fine-tuned with cross-entropy loss on labeled document set."
    key_design_choices:
      - choice: "Use BERT-base rather than larger model"
        rationale: "Sufficient accuracy for 12-class problem with lower inference cost."
    target_persons_groups: "Internal employees across all departments submitting documents for routing."
    optimization_targets: "Classification accuracy and low latency (< 200ms per document)."
    parameter_relevance: "Classification head weights dominate routing decisions; encoder layers are frozen and contribute fixed features."
    expected_output: "Category label (one of 12) with confidence score."
    output_quality: "92% accuracy on held-out test set (F1 macro: 0.89)."
    compliance_tradeoffs: "No trade-offs were made between technical solutions in meeting the Chapter III, Section 2 requirements."
  architecture:
    description: "FastAPI service wrapping HuggingFace transformers pipeline. Single container, GPU inference."
  human_oversight:
    assessment: "Deployers review low-confidence classifications (< 0.7) before acting on them."
    interpretability_measures: "Confidence score displayed alongside each classification. Top-3 predictions shown."
  validation_and_testing:
    procedures: "80/10/10 train/val/test split. Cross-validation on training set."
    test_data:
      description: "1,200 manually labeled documents from past 2 years."
    metrics:
      accuracy: "92% overall accuracy, F1 macro 0.89."
      robustness: "Tested with OCR-degraded inputs — accuracy drops to 85%."
  cybersecurity_measures: "API authentication via API keys. TLS 1.3. Input size limits. No PII stored."

monitoring:
  capabilities_and_limitations: "Classifies text documents into 12 categories. Cannot handle images, audio, or documents in languages other than English and Dutch."
  accuracy_per_group:
    - group: "English documents"
      accuracy: "94% accuracy"
    - group: "Dutch documents"
      accuracy: "88% accuracy"
  overall_expected_accuracy: "92% accuracy across all document types in intended use."
  foreseeable_unintended_outcomes: "Misclassification of ambiguous documents could route them to wrong department, causing processing delays."
  risk_sources:
    health_and_safety: "None — document classification has no direct health or safety impact."
    fundamental_rights: "Minimal — internal use only, no decisions about natural persons."
    discrimination: "Accuracy gap between English and Dutch documents could disadvantage Dutch-language submissions."
  human_oversight_measures: "Low-confidence results flagged for human review. Deployers can override any classification."
  output_interpretation_measures: "Confidence scores and top-3 predictions displayed to help deployers assess reliability."

performance_metrics:
  appropriateness_description: "F1 macro chosen because class distribution is imbalanced — accuracy alone would overweight the dominant category. Robustness tested with degraded inputs because source documents vary in scan quality."

risk_management:
  system_description: "Lightweight risk management process covering development through deployment."
  risk_identification: "Risks identified through threat modelling and user interviews with document processing staff."
  risk_evaluation: "Risks ranked by likelihood and impact on document processing workflow."
  risk_mitigation_measures: "Low-confidence flagging, human review queue, quarterly accuracy audit on production data."

lifecycle_changes:
  changes: []

standards:
  alternative_solutions: "No harmonised standards published for AI Act as of May 2026. Compliance achieved through internal quality processes aligned with ISO/IEC 42001:2023 principles."
  other_standards:
    - reference: "ISO/IEC 42001:2023"
      description: "AI management system (used as guidance, not certified)."

declaration_of_conformity:
  provider_name: "Acme Corp B.V."
  system_name: "Acme Document Classifier"
  declaration_date: "2026-05-17"

post_market_monitoring:
  evaluation_system: "Monthly accuracy audit on 100 randomly sampled production classifications verified by human reviewers."
  monitoring_plan: "Monthly sampling audit. Quarterly full performance review. Incident reporting within 15 days per Article 73."
