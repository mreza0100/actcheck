name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Validate canonical template
        run: node dist/cli.js validate schemas/annex-iv/v1/template.yaml

      - name: Validate worked examples
        run: |
          node dist/cli.js validate schemas/annex-iv/v1/examples/minimal.yaml
          node dist/cli.js validate schemas/annex-iv/v1/examples/freudche.yaml
